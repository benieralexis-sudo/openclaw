<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%232563EB'/%3E%3Cstop offset='100%25' stop-color='%231e40af'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22.5' text-anchor='middle' fill='white' font-family='Inter,system-ui,sans-serif' font-size='21' font-weight='600'%3Ei%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="/public/manifest.json">
<meta name="theme-color" content="#2563EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="/public/css/style.css">
<link rel="stylesheet" href="/public/css/animations.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4" crossorigin="anonymous"></script>
</head>
<body>
<a href="#main-content" class="skip-link">Aller au contenu principal</a>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo-mark">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:linear-gradient(135deg,#2563EB,#1e40af);border-radius:7px;box-shadow:0 1px 3px rgba(29,78,216,0.3)"><span style="color:#fff;font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:17px;line-height:1">i</span></div>
    </div>
    <div class="logo-text">MISSION CONTROL</div>
  </div>

  <div class="sidebar-search">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><use href="/public/assets/icons.svg#search"/></svg>
    <input type="text" id="global-search" placeholder="Rechercher..." autocomplete="off">
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">ACTIVITÉ</div>

    <a href="#dashboard" class="nav-item active" data-page="dashboard">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#home"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="#unibox" class="nav-item" data-page="unibox">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#message-circle"/></svg>
      <span>Unibox</span>
      <span class="nav-badge" id="badge-unibox" style="display:none">0</span>
    </a>
    <a href="#pipeline" class="nav-item" data-page="pipeline">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#bar-chart"/></svg>
      <span>Pipeline</span>
      <span class="nav-badge badge-accent" id="badge-pipeline" style="display:none">0</span>
    </a>
    <a href="#leads" class="nav-item" data-page="leads">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#target"/></svg>
      <span>Leads</span>
      <span class="nav-badge" id="badge-leads" style="display:none">0</span>
    </a>
    <a href="#campaigns" class="nav-item" data-page="campaigns">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#mail"/></svg>
      <span>Campagnes</span>
    </a>
    <a href="#drafts" class="nav-item" data-page="drafts">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#inbox"/></svg>
      <span>Approbations</span>
      <span class="nav-badge" id="badge-drafts" style="display:none">0</span>
    </a>

    <div class="nav-separator"></div>
    <div class="nav-section-label">GESTION</div>

    <a href="#crm" class="nav-item" data-page="crm">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#bar-chart"/></svg>
      <span>CRM</span>
    </a>
    <a href="#settings" class="nav-item" data-page="settings">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#settings"/></svg>
      <span>Parametres</span>
    </a>

    <div class="nav-separator"></div>
    <div class="nav-section-label">ADMIN</div>

    <a href="#finances" class="nav-item" data-page="finances">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#dollar-sign"/></svg>
      <span>Finances</span>
    </a>
    <a href="#intelligence" class="nav-item" data-page="intelligence">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#brain"/></svg>
      <span>Intelligence</span>
    </a>
    <a href="#triggers" class="nav-item" data-page="triggers">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#target"/></svg>
      <span>Triggers FR</span>
    </a>
    <a href="#system" class="nav-item" data-page="system">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#settings"/></svg>
      <span>Système</span>
      <span class="nav-badge badge-warning" id="badge-system" style="display:none">!</span>
    </a>
    <a href="#clients" class="nav-item" data-page="clients">
      <svg class="nav-icon"><use href="/public/assets/icons.svg#user"/></svg>
      <span>Clients</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="client-selector">
      <svg class="nav-icon" style="width:16px;height:16px"><use href="/public/assets/icons.svg#user"/></svg>
      <span></span>
    </div>
    <a href="/logout" class="logout-link">
      <svg class="nav-icon" style="width:16px;height:16px"><use href="/public/assets/icons.svg#log-out"/></svg>
      <span>Déconnexion</span>
    </a>
  </div>
</aside>

<!-- Mobile header -->
<header class="mobile-header" id="mobile-header">
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div class="logo-text">MISSION CONTROL</div>
  <div style="width:32px"></div>
</header>

<!-- Overlay mobile -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Notification bell (top-right) -->
<div id="notif-bell" class="notif-bell" style="display:none">
  <button id="notif-bell-btn" class="notif-bell-btn" aria-label="Notifications">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span id="notif-badge" class="notif-badge" style="display:none">0</span>
  </button>
  <div id="notif-dropdown" class="notif-dropdown" style="display:none">
    <div class="notif-header">
      <span style="font-weight:600;font-size:14px">Notifications</span>
      <button id="notif-mark-all" style="font-size:12px;color:var(--accent-blue);background:none;border:none;cursor:pointer">Tout marquer lu</button>
    </div>
    <div id="notif-list" class="notif-list">
      <div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px">Aucune notification</div>
    </div>
  </div>
</div>

<!-- Main content -->
<main class="main-content" id="main-content" tabindex="-1">
  <div class="page-container" id="page-container" aria-live="polite">
    <!-- Pages rendered dynamically -->
  </div>
</main>

<!-- Prospect Drawer -->
<div id="drawer-overlay" class="drawer-overlay"></div>
<div id="prospect-drawer" class="drawer"></div>

<!-- Chat Widget (bulle flottante) -->
<div id="chat-widget" class="chat-widget">
  <div id="chat-widget-popup" class="chat-widget-popup" style="display:none">
    <div class="chat-widget-header">
      <span style="font-weight:600;font-size:14px">Chat Bot</span>
      <a href="#chat" class="chat-widget-fullscreen">Plein écran &rarr;</a>
    </div>
    <div id="chat-widget-messages" class="chat-widget-messages"></div>
    <div class="chat-widget-input-wrap">
      <input type="text" id="chat-widget-input" placeholder="Message..." autocomplete="off">
      <button id="chat-widget-send" aria-label="Envoyer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
  <button id="chat-widget-btn" class="chat-widget-btn" aria-label="Ouvrir le chat">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><use href="/public/assets/icons.svg#message-circle"/></svg>
  </button>
</div>

<!-- Scripts -->
<script src="/public/js/utils.js"></script>
<script src="/public/js/api.js"></script>
<script src="/public/js/charts.js"></script>
<script src="/public/js/pages/dashboard.js"></script>
<script src="/public/js/pages/leads.js"></script>
<script src="/public/js/pages/campaigns.js"></script>
<script src="/public/js/pages/drafts.js"></script>
<script src="/public/js/pages/unibox.js"></script>
<script src="/public/js/pages/pipeline.js"></script>
<script src="/public/js/pages/crm.js"></script>
<script src="/public/js/pages/chat.js"></script>
<script src="/public/js/pages/finances.js"></script>
<script src="/public/js/pages/intelligence.js"></script>
<script src="/public/js/pages/triggers.js"></script>
<script src="/public/js/pages/system.js"></script>
<script src="/public/js/pages/clients.js"></script>
<script src="/public/js/pages/onboarding.js"></script>
<script src="/public/js/pages/settings.js"></script>
<script src="/public/js/rich-editor.js"></script>
<script src="/public/js/prospect-drawer.js"></script>
<script src="/public/js/command-palette.js"></script>
<script src="/public/js/keyboard.js"></script>
<script src="/public/js/notifications.js"></script>
<script src="/public/js/app.js"></script>
<script src="/public/js/chat-widget.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/public/sw.js').catch(function() {});
}
</script>

</body>
</html>
