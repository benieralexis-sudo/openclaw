services:
  # ═══════════════════════════════════════════════════════════════════════
  # iFIND Trigger Engine v2.0 — Routeur central + cerveau Opus
  # ═══════════════════════════════════════════════════════════════════════
  telegram-router:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: "root"
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID]
    environment:
      # ── Core auth ──
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-1409505520}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}

      # ── IA providers ──
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-${CLAUDE_API_KEY:-}}

      # ── Email + IMAP ──
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      SENDER_EMAIL: ${SENDER_EMAIL:-onboarding@resend.dev}
      SENDER_NAME: ${SENDER_NAME:-Alexis}
      SENDER_FULL_NAME: ${SENDER_FULL_NAME:-Alexis Bénier}
      SENDER_TITLE: ${SENDER_TITLE:-Fondateur}
      SENDER_DOMAINS: ${SENDER_DOMAINS:-}
      REPLY_TO_EMAIL: ${REPLY_TO_EMAIL:-}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASS: ${IMAP_PASS:-}
      IMAP_MAILBOXES: ${IMAP_MAILBOXES:-}
      NOTIFY_POSITIVE_EMAILS: ${NOTIFY_POSITIVE_EMAILS:-}

      # ── Trigger Engine sources FR ──
      PAPPERS_API_TOKEN: ${PAPPERS_API_TOKEN:-}
      DROPCONTACT_API_KEY: ${DROPCONTACT_API_KEY:-}
      FRANCETRAVAIL_CLIENT_ID: ${FRANCETRAVAIL_CLIENT_ID:-}
      FRANCETRAVAIL_CLIENT_SECRET: ${FRANCETRAVAIL_CLIENT_SECRET:-}
      INPI_USERNAME: ${INPI_USERNAME:-}
      INPI_PASSWORD: ${INPI_PASSWORD:-}
      META_AD_LIBRARY_TOKEN: ${META_AD_LIBRARY_TOKEN:-}

      # ── Stack B2B 2026 (à activer après achat clés) ──
      RODZ_API_KEY: ${RODZ_API_KEY:-}
      THEIRSTACK_API_KEY: ${THEIRSTACK_API_KEY:-}
      TRIGIFY_API_KEY: ${TRIGIFY_API_KEY:-}
      DATAGMA_API_KEY: ${DATAGMA_API_KEY:-}
      MILLIONVERIFIER_API_KEY: ${MILLIONVERIFIER_API_KEY:-}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN:-}
      SMARTLEAD_API_KEY: ${SMARTLEAD_API_KEY:-}
      FOLK_API_KEY: ${FOLK_API_KEY:-}
      AIRCALL_API_ID: ${AIRCALL_API_ID:-}
      AIRCALL_API_TOKEN: ${AIRCALL_API_TOKEN:-}

      # ── Trigger Engine toggles ──
      TRIGGER_ENGINE_ENABLED: ${TRIGGER_ENGINE_ENABLED:-true}
      CLAUDE_BRAIN_ENABLED: ${CLAUDE_BRAIN_ENABLED:-true}
      CLAUDE_BRAIN_BUDGET_MONTHLY_EUR: ${CLAUDE_BRAIN_BUDGET_MONTHLY_EUR:-300}
      CLAUDE_BRAIN_BUDGET_HARD_EUR: ${CLAUDE_BRAIN_BUDGET_HARD_EUR:-500}

      # ── Boosters v1.1 (combo + hot + declarative-pain) ──
      COMBO_BOOSTER_ENABLED: ${COMBO_BOOSTER_ENABLED:-true}
      HOT_TRIGGERS_ENABLED: ${HOT_TRIGGERS_ENABLED:-true}
      DECLARATIVE_PAIN_ENABLED: ${DECLARATIVE_PAIN_ENABLED:-false}

      # ── HubSpot (lecture seule, optionnel) ──

      # ── Google Calendar (booking RDV) ──
      GOOGLE_BOOKING_URL: ${GOOGLE_BOOKING_URL:-}
      BOOKING_URL: ${BOOKING_URL:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-}
      DEFAULT_MEETING_DURATION: ${DEFAULT_MEETING_DURATION:-15}

      # ── Webhooks externes ──
      RODZ_WEBHOOK_SECRET: ${RODZ_WEBHOOK_SECRET:-}
      TALLY_API_KEY: ${TALLY_API_KEY:-}

      # ── Branding ──
      CLIENT_NAME: ${CLIENT_NAME:-iFIND}
      CLIENT_DOMAIN: ${CLIENT_DOMAIN:-ifind.fr}
      TRACKING_DOMAIN: ${TRACKING_DOMAIN:-ifind.fr}
      CLIENT_DESCRIPTION: ${CLIENT_DESCRIPTION:-Trigger Engine FR — Détection signaux d'achat B2B}
      CLIENT_TAGLINE: ${CLIENT_TAGLINE:-Détection signaux d'achat temps réel}

      # ── Data dirs (legacy v9.5 stubbés mais conservés pour compat reply-pipeline) ──
      AUTOMAILER_DATA_DIR: /data/automailer
      INBOX_MANAGER_DATA_DIR: /data/inbox-manager
      MEETING_SCHEDULER_DATA_DIR: /data/meeting-scheduler
      APP_CONFIG_DIR: /data/app-config
      VISITOR_DATA_DIR: /data/visitors

      # ── Limites & monitoring ──
      API_DAILY_BUDGET: ${API_DAILY_BUDGET:-5}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      # Code source (bind mount pour hot-reload dev)
      - ./node_modules:/app/node_modules
      - ./gateway:/app/gateway
      - ./skills/automailer:/app/skills/automailer
      - ./skills/inbox-manager:/app/skills/inbox-manager
      - ./skills/meeting-scheduler:/app/skills/meeting-scheduler
      - ./skills/trigger-engine:/app/skills/trigger-engine
      - ./skills/package.json:/app/skills/package.json:ro
      # Volumes persistants
      - automailer-data:/data/automailer
      - inbox-manager-data:/data/inbox-manager
      - meeting-scheduler-data:/data/meeting-scheduler
      - app-config-data:/data/app-config
      - visitor-data:/data/visitors
      - trigger-engine-data:/app/skills/trigger-engine/data
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    entrypoint:
      - sh
      - -c
      - >
        mkdir -p /data/automailer /data/inbox-manager /data/meeting-scheduler
        /data/app-config /data/visitors /app/skills/trigger-engine/data &&
        chown -R node:node /data/automailer /data/inbox-manager /data/meeting-scheduler
        /data/app-config /data/visitors /app/skills/trigger-engine/data &&
        cd /app && exec runuser -u node -- node /app/gateway/telegram-router.js
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:9090/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════════
  # Mission Control — Dashboard HTTPS (port 3000)
  # ═══════════════════════════════════════════════════════════════════════
  mission-control:
    image: node:22-alpine
    working_dir: /app
    user: "root"
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    environment:
      DASHBOARD_PORT: "3000"
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      DASHBOARD_OWNER: ${DASHBOARD_OWNER:-}
      AUTOMAILER_DATA_DIR: /data/automailer
      INBOX_MANAGER_DATA_DIR: /data/inbox-manager
      MEETING_SCHEDULER_DATA_DIR: /data/meeting-scheduler
      APP_CONFIG_DIR: /data/app-config
      DASHBOARD_DATA_DIR: /data/dashboard
      CLIENT_NAME: ${CLIENT_NAME:-iFIND}
      ROUTER_URL: http://telegram-router:9090
    volumes:
      - ./dashboard:/app
      - ./gateway/logger.js:/gateway/logger.js:ro
      - ./clients:/clients
      - dashboard-data:/data/dashboard
      - automailer-data:/data/automailer:ro
      - inbox-manager-data:/data/inbox-manager:ro
      - meeting-scheduler-data:/data/meeting-scheduler:ro
      - app-config-data:/data/app-config:ro
      - trigger-engine-data:/app/skills/trigger-engine/data:ro
    ports:
      - "127.0.0.1:3000:3000"
    init: true
    restart: unless-stopped
    entrypoint: ["sh", "-c", "chown -R node:node /data/dashboard && cd /app && su -s /bin/sh node -c 'npm install --production && exec node server.js'"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000/login',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════
  # Landing Page — pages rapports prospects (port 3080)
  # ═══════════════════════════════════════════════════════════════════════
  landing-page:
    image: node:22-alpine
    working_dir: /app
    user: "root"
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE]
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    environment:
      LANDING_PORT: "3080"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-1409505520}
      IPINFO_TOKEN: ${IPINFO_TOKEN:-}
      VISITOR_TRACKING_ENABLED: ${VISITOR_TRACKING_ENABLED:-true}
      VISITOR_DATA_DIR: /data/visitors
      CLIENT_DOMAIN: ${CLIENT_DOMAIN:-ifind.fr}
      CLIENT_NAME: ${CLIENT_NAME:-iFIND}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDER_EMAIL: ${SENDER_EMAIL:-}
      REPLY_TO_EMAIL: ${REPLY_TO_EMAIL:-}
    volumes:
      - ./landing:/app
      - visitor-data:/data/visitors
    ports:
      - "127.0.0.1:3080:3080"
    init: true
    restart: unless-stopped
    entrypoint: ["sh", "-c", "mkdir -p /data/visitors && cd /app && npm install --production && exec node server.js"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3080',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ═══════════════════════════════════════════════════════════════════════
# Volumes persistants
# ═══════════════════════════════════════════════════════════════════════
volumes:
  # Volumes actifs v2.0
  trigger-engine-data:
  inbox-manager-data:
  meeting-scheduler-data:
  automailer-data:        # storage.js encore lazy-required par reply-pipeline
  dashboard-data:
  visitor-data:
  app-config-data:
    name: moltbot_app-config-data
    external: true

  # Volumes legacy v9.5 — backup dans /opt/moltbot-archive-v1/legacy-volumes-20260425.tar.gz
  # Conservés en déclaration le temps de la migration (n'occupe rien si non monté).
  # autonomous-pilot-data: { external: true }
  # self-improve-data:     { external: true }
  # web-intelligence-data: { external: true }
  # system-advisor-data:   { external: true }
  # proactive-agent-data:  { external: true }
  # crm-pilot-data:        { external: true }
  # invoice-bot-data:      { external: true }
  # lead-enrich-data:      { external: true }
  # flowfast-data:         { external: true }
